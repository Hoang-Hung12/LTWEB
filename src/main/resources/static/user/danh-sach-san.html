<body>

            <li><hr class="dropdown-divider"></li>

<div class="page-header">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
    <h3 class="fw-bold border-start border-4 border-primary ps-3 mb-0">Danh sách sân</h3>
    <div class="filter-box">
      <select class="form-select form-select-sm" id="filter-loai" style="width:170px" onchange="applyFilters()">
        <option value="">Tất cả loại sân</option>
      </select>
      <select class="form-select form-select-sm" id="filter-tt" style="width:160px" onchange="applyFilters()">
        <option value="">Tất cả trạng thái</option>
        <option value="EMPTY">Còn trống</option>
        <option value="MAINTENANCE">Bảo trì</option>
      </select>
      <select class="form-select form-select-sm" id="filter-sort" style="width:190px" onchange="applyFilters()">
        <option value="default">Sắp xếp mặc định</option>
        <option value="asc">Giá: Thấp → Cao</option>
        <option value="desc">Giá: Cao → Thấp</option>
      </select>
    </div>
  </div>
</div>

<div class="container py-4">
  <div class="row" id="san-list">
    <div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Đang tải danh sách sân...</p></div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
  <div class="container"><p class="mb-0">&copy; 2026 ARENAX Football Management.</p></div>
</footer>

<!-- Modal chi tiết -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
  <div class="custom-modal">
    <i class="fas fa-times modal-close" onclick="closeModal()"></i>
    <div class="modal-left">
      <img id="modal-san-img" src="" alt="" style="width:100%;height:200px;object-fit:cover;border-radius:8px;margin-bottom:16px">
      <h2 class="modal-title" id="modal-san-title"></h2>
      <p class="modal-loc"><i class="fas fa-map-marker-alt text-danger me-2"></i><span id="modal-san-diachi"></span></p>
      <p><span class="badge bg-info text-dark" id="modal-san-loai"></span></p>
      <hr>
      <h5 class="mb-3 fw-bold">Tiện ích</h5>
      <div class="amenities" id="modal-san-tieních"></div>
      <h5 class="mb-2 fw-bold mt-4">Mô tả</h5>
      <p class="modal-desc" id="modal-san-mota"></p>
    </div>
    <div class="modal-right">
      <div class="price-box"><h3 id="modal-san-gia"></h3><span>/ 1.5h</span></div>
      <hr>
      <ul class="benefits">
        <li><i class="fas fa-check text-success"></i> Giữ sân ngay lập tức</li>
        <li><i class="fas fa-check text-success"></i> Đặt cọc online chỉ 30%</li>
        <li><i class="fas fa-check text-success"></i> Hoàn cọc nếu hủy trước 24h</li>
      </ul>
      <button class="btn btn-primary w-100 fw-bold py-2 mt-2" id="modal-btn-dat">ĐẶT LỊCH NGAY</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../user/js/auth.js"></script>
<script>
  let allSans = [];

  document.addEventListener('DOMContentLoaded', () => {
    const user = getCurrentUser();
    if (user) {
      const av = document.getElementById('nav-user-avatar');
      if (av) av.textContent = (user.hoTen || 'U')[0].toUpperCase();
    }
    loadLoaiSan(document.getElementById('filter-loai'));
    loadSans();
  });

  async function loadSans() {
    const list = document.getElementById('san-list');
    try {
      const res  = await fetch(API_BASE + '/api/san');
      if (!res.ok) throw new Error();
      allSans = await res.json();
      applyFilters();
    } catch {
      list.innerHTML = '<p class="text-danger text-center py-4 col-12"><i class="fas fa-exclamation-triangle me-2"></i>Không kết nối được server!</p>';
    }
  }

  function applyFilters() {
    const loai = document.getElementById('filter-loai').value;
    const tt   = document.getElementById('filter-tt').value;
    const sort = document.getElementById('filter-sort').value;
    let data = [...allSans];
    if (loai) data = data.filter(s => s.maLoaiSan === loai);
    if (tt)   data = data.filter(s => (s.trangThai || '').toUpperCase() === tt.toUpperCase());
    if (sort === 'asc')  data.sort((a,b) => (a.giaThue||0) - (b.giaThue||0));
    if (sort === 'desc') data.sort((a,b) => (b.giaThue||0) - (a.giaThue||0));
    const list = document.getElementById('san-list');
    list.innerHTML = data.length === 0
      ? '<p class="text-muted text-center py-4 col-12">Không có sân phù hợp.</p>'
      : data.map(buildSanCard).join('');
  }
</script>
</body>
</html>
