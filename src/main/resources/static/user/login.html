<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - ArenaX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../user/css/style.css">
    <link rel="stylesheet" href="../user/css/login.css">
</head>
<body>
<div class="auth-card">
  <div class="auth-header">
    <h4 class="mb-0 fw-bold"><i class="fas fa-futbol me-2"></i>ARENAX</h4>
  </div>
  <div class="p-4">
    <ul class="nav nav-tabs nav-fill mb-4" id="myTab">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Đăng nhập</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">Đăng ký</button></li>
    </ul>
    <div class="tab-content">

      <!-- ĐĂNG NHẬP -->
      <div class="tab-pane fade show active" id="login">
        <div id="login-error" class="alert alert-danger py-2 d-none"></div>
        <div class="mb-3">
          <input type="text" class="form-control" id="login-sdt" placeholder="Số điện thoại">
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="login-pw" placeholder="Mật khẩu">
        </div>
        <button class="btn btn-primary w-100 fw-bold" id="btn-login" onclick="doLogin()">ĐĂNG NHẬP</button>
        <div class="text-center mt-3">
          <a href="index.html" class="text-muted small">← Quay về trang chủ</a>
        </div>
      </div>

      <!-- ĐĂNG KÝ -->
      <div class="tab-pane fade" id="register">
        <div id="reg-error" class="alert alert-danger py-2 d-none"></div>
        <div id="reg-success" class="alert alert-success py-2 d-none"></div>
        <div class="mb-3">
          <input type="text" class="form-control" id="reg-hoten" placeholder="Họ và tên">
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" id="reg-sdt" placeholder="Số điện thoại">
        </div>
        <div class="mb-3">
          <input type="email" class="form-control" id="reg-email" placeholder="Email">
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="reg-pw" placeholder="Mật khẩu">
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="reg-pw2" placeholder="Nhập lại mật khẩu">
        </div>
        <button class="btn btn-success w-100 fw-bold" id="btn-reg" onclick="doRegister()">ĐĂNG KÝ TÀI KHOẢN</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../user/js/auth.js"></script>
<script>
  const API_BASE_LOGIN = 'http://localhost:8080';

  // Nếu đã đăng nhập thì redirect thẳng
  document.addEventListener('DOMContentLoaded', () => {
    if (getCurrentUser()) window.location.href = 'index.html';
  });

  async function doLogin() {
    const sdt = document.getElementById('login-sdt').value.trim();
    const pw  = document.getElementById('login-pw').value;
    const err = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');
    if (!sdt || !pw) { showErr(err, 'Vui lòng nhập đầy đủ!'); return; }
    btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
    try {
      const res = await fetch(API_BASE_LOGIN + '/api/taikhoan/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({sdt, matKhau: pw})
      });
      if (!res.ok) { showErr(err, 'Sai số điện thoại hoặc mật khẩu!'); return; }
      const user = await res.json();
      setCurrentUser(user);
      const redirect = sessionStorage.getItem('arenax_redirect');
      sessionStorage.removeItem('arenax_redirect');
      window.location.href = redirect || 'index.html';
    } catch { showErr(err, 'Không kết nối được server!'); }
    finally { btn.disabled = false; btn.textContent = 'ĐĂNG NHẬP'; }
  }

  async function doRegister() {
    const hoTen  = document.getElementById('reg-hoten').value.trim();
    const sdt    = document.getElementById('reg-sdt').value.trim();
    const email  = document.getElementById('reg-email').value.trim();
    const pw     = document.getElementById('reg-pw').value;
    const pw2    = document.getElementById('reg-pw2').value;
    const err    = document.getElementById('reg-error');
    const succ   = document.getElementById('reg-success');
    const btn    = document.getElementById('btn-reg');
    err.classList.add('d-none'); succ.classList.add('d-none');
    if (!hoTen || !sdt || !pw) { showErr(err, 'Vui lòng điền đầy đủ!'); return; }
    if (pw !== pw2) { showErr(err, 'Mật khẩu nhập lại không khớp!'); return; }
    btn.disabled = true; btn.textContent = 'Đang đăng ký...';
    try {
      const res = await fetch(API_BASE_LOGIN + '/api/taikhoan/register', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({hoTen, sdt, email, matKhau: pw})
      });
      if (!res.ok) {
        const msg = await res.text();
        showErr(err, msg || 'Đăng ký thất bại!');
        return;
      }
      succ.textContent = 'Đăng ký thành công! Chuyển sang đăng nhập...';
      succ.classList.remove('d-none');
      setTimeout(() => document.querySelector('[data-bs-target="#login"]').click(), 1500);
    } catch { showErr(err, 'Không kết nối được server!'); }
    finally { btn.disabled = false; btn.textContent = 'ĐĂNG KÝ TÀI KHOẢN'; }
  }

  function showErr(el, msg) { el.textContent = msg; el.classList.remove('d-none'); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('login-pw') === document.activeElement) doLogin();
      if (document.getElementById('reg-pw2') === document.activeElement) doRegister();
    }
  });
</script>
</body>
</html>
