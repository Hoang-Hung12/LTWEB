<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - SanBong PTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../static/user/css/style.css">
    <link rel="stylesheet" href="../../static/user/css/login.css">
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <h4 class="mb-0 fw-bold"><i class="fas fa-futbol me-2"></i>ARENAX</h4>
        </div>
        
        <div class="p-4">
            <ul class="nav nav-tabs nav-fill mb-4" id="myTab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Đăng nhập</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">Đăng ký</button>
                </li>
            </ul>

            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="login">
                    <button class="btn btn-google btn-social"><i class="fab fa-google me-2"></i> Google</button>
                    <button class="btn btn-facebook btn-social"><i class="fab fa-facebook-f me-2"></i> Facebook</button>
                    
                    <div class="text-center text-muted small my-3">- Hoặc -</div>
                    
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Email / Số điện thoại">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Mật khẩu">
                        </div>
                        <div class="d-flex justify-content-between small mb-3">
                            <a href="#" class="text-decoration-none" onclick="document.getElementById('forgot-pass-area').classList.toggle('d-none')">Quên mật khẩu?</a>
                        </div>
                        
                        <div id="forgot-pass-area" class="alert alert-secondary d-none p-2 mb-3">
                            <small>Nhập email để nhận mã xác nhận:</small>
                            <div class="input-group mt-1">
                                <input type="email" class="form-control form-control-sm" placeholder="Email của bạn">
                                <button class="btn btn-dark btn-sm">Gửi</button>
                            </div>
                        </div>

                        <button class="btn btn-primary w-100 fw-bold">ĐĂNG NHẬP</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="register">
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Họ và tên">
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Số điện thoại">
                        </div>
                        <div class="mb-3">
                            <div class="input-group">
                                <input type="text" class="form-control" placeholder="Nhập mã OTP">
                                <button class="btn btn-outline-secondary" type="button">Gửi mã</button>
                            </div>
                            <small class="text-muted" style="font-size: 0.8rem;">Mã xác thực sẽ gửi về SĐT của bạn</small>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Mật khẩu">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Nhập lại mật khẩu">
                        </div>
                        <button class="btn btn-success w-100 fw-bold">ĐĂNG KÝ TÀI KHOẢN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/user/js/main.js"></script>
</body>
</html>
